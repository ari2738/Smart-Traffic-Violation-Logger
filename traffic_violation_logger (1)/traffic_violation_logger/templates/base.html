<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Traffic Violation Logger</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
  :root {
    --primary: #1a1a2e;
    --accent: #e94560;
    --accent2: #f5a623;
    --surface: #16213e;
    --card: #0f3460;
    --text: #eaeaea;
    --muted: #8892a4;
  }
  body { background: var(--primary); color: var(--text); font-family: 'Segoe UI', sans-serif; min-height: 100vh; }
  .navbar { background: var(--surface) !important; border-bottom: 2px solid var(--accent); }
  .navbar-brand { color: var(--accent) !important; font-weight: 800; font-size: 1.3rem; letter-spacing: 1px; }
  .nav-link { color: var(--text) !important; font-weight: 500; transition: color 0.2s; }
  .nav-link:hover, .nav-link.active { color: var(--accent) !important; }
  .card { background: var(--card); border: 1px solid rgba(233,69,96,0.2); border-radius: 12px; }
  .btn-danger { background: var(--accent); border-color: var(--accent); }
  .btn-danger:hover { background: #c73652; border-color: #c73652; }
  .btn-warning { background: var(--accent2); border-color: var(--accent2); color: #1a1a2e; font-weight: 600; }
  .table { color: var(--text); }
  .table thead th { border-bottom: 2px solid var(--accent); color: var(--accent); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
  .table tbody tr { border-color: rgba(255,255,255,0.05); transition: background 0.2s; }
  .table tbody tr:hover { background: rgba(233,69,96,0.07); }
  .badge-unpaid { background: rgba(233,69,96,0.2); color: var(--accent); border: 1px solid var(--accent); padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; }
  .badge-paid { background: rgba(40,167,69,0.2); color: #28a745; border: 1px solid #28a745; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; }
  .form-control, .form-select { background: var(--surface); border: 1px solid rgba(255,255,255,0.1); color: var(--text); border-radius: 8px; }
  .form-control:focus, .form-select:focus { background: var(--surface); color: var(--text); border-color: var(--accent); box-shadow: 0 0 0 0.2rem rgba(233,69,96,0.2); }
  .form-label { color: var(--muted); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; }
  .alert-success { background: rgba(40,167,69,0.15); border-color: #28a745; color: #5cdb5c; }
  .stat-card { background: var(--surface); border-radius: 16px; padding: 24px; border: 1px solid rgba(255,255,255,0.05); transition: transform 0.2s; }
  .stat-card:hover { transform: translateY(-4px); }
  .stat-number { font-size: 2.5rem; font-weight: 800; }
  .page-header { background: linear-gradient(135deg, var(--surface), var(--card)); border-radius: 16px; padding: 28px 32px; margin-bottom: 28px; border-left: 4px solid var(--accent); }
</style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">
    <a class="navbar-brand" href="/"><i class="fas fa-traffic-light me-2"></i>TrafficLog</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="/"><i class="fas fa-home me-1"></i>Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="/add"><i class="fas fa-plus-circle me-1"></i>Add Violation</a></li>
        <li class="nav-item"><a class="nav-link" href="/history"><i class="fas fa-history me-1"></i>History</a></li>
      </ul>
    </div>
  </div>
</nav>
<div class="container py-4">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endif %}
  {% endwith %}
  {% block content %}{% endblock %}
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
</body>
</html>
